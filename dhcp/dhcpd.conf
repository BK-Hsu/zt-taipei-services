option domain-name "example.org";
option domain-name-servers 192.168.1.1;

default-lease-time 600;
max-lease-time 7200;

ddns-update-style none;
authoritative;

# RFC4578 PXE client system architecture
option arch code 93 = unsigned integer 16;

host Ben-PVE-server {
  hardware ethernet f0:b2:b9:04:6f:b7;
  fixed-address 192.168.1.10;
}

subnet 192.168.1.0 netmask 255.255.255.0 {
  range 192.168.1.100 192.168.1.250;
  option routers 192.168.1.1;
  option broadcast-address 192.168.1.255;

  next-server 192.168.1.1;

  # ============================================================
  # 1) If client is already iPXE -> go HTTP script (fast + flexible)
  # ============================================================
  if exists user-class and option user-class = "iPXE" {
    filename "http://192.168.1.1/boot.ipxe";
  }

  # ============================================================
  # 2) UEFI x86_64 (主力：最常見的 server / PC)
  #    00:07 = EFI x86-64
  #    00:09 = EFI x86-64 (HTTP) / 某些實作會回報這個
  # ============================================================
  else if option arch = 00:07 or option arch = 00:09 {
    filename "UEFI/grubx64.efi";
  }

  # ============================================================
  # 3) Legacy BIOS fallback
  # ============================================================
  else {
    filename "Legacy/pxelinux.0";
  }

  # ============================================================
  # [備用] 其他 UEFI 架構（目前不啟用，未來要用再打開）
  #
  # 啟用前請先確認 /srv/tftp/UEFI/ 內有對應檔案：
  #   - grubia32.efi  (UEFI IA32)
  #   - grubarm.efi   (UEFI ARM32)
  #   - grubaa64.efi  (UEFI ARM64)
  #
  # 常見 arch code：
  #   00:06 = EFI IA32
  #   00:0A = EFI ARM32
  #   00:0B = EFI ARM64
  #
  # 範例（要用就把下面段落搬到上面 else { Legacy } 前面，並取消註解）：
  #
  # else if option arch = 00:06 {
  #   filename "UEFI/grubia32.efi";
  # }
  # else if option arch = 00:0A {
  #   filename "UEFI/grubarm.efi";
  # }
  # else if option arch = 00:0B {
  #   filename "UEFI/grubaa64.efi";
  # }
  # ============================================================
}
