set default=0
set timeout=10

# ===== SOL-friendly GRUB menu output =====
set gfxpayload=text
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

# ===== Common params =====
# Ubuntu Live ISO (casper) common parameters
# NOTE: ramdisk_size raised for stability
set common_root="root=/dev/ram0 ramdisk_size=2500000 ip=dhcp boot=casper"

# SOL console parameters (Serial-over-LAN)
# - Reduce noise: loglevel=3 + systemd.show_status=false
# - Do NOT force all logs to console (no systemd.log_target=console)
# - ttyS0 first for SOL
set sol_console="console=ttyS0,115200n8 console=tty0 nomodeset loglevel=3 systemd.show_status=false"

# -------------------------
# Ubuntu 20.04 Desktop (kernel/initrd from casper + ISO via HTTP)
# -------------------------
menuentry 'Ubuntu 20.04 IPv4 (VGA/Normal)' {
    linux (http,192.168.1.1)/ubuntu2004/casper/vmlinuz ${common_root} url=http://192.168.1.1/ubuntu2004/ubuntu-20.04.4-desktop-amd64.iso ---
    initrd (http,192.168.1.1)/ubuntu2004/casper/initrd
}
menuentry 'Ubuntu 20.04 IPv4 (SOL)' {
    linux (http,192.168.1.1)/ubuntu2004/casper/vmlinuz ${common_root} url=http://192.168.1.1/ubuntu2004/ubuntu-20.04.4-desktop-amd64.iso ${sol_console} ---
    initrd (http,192.168.1.1)/ubuntu2004/casper/initrd
}

menuentry 'Ubuntu 20.04 IPv6 (VGA/Normal)' {
    linux (http,[fd00:192:168:1::1])/ubuntu2004/casper/vmlinuz ${common_root} url=http://[fd00:192:168:1::1]/ubuntu2004/ubuntu-20.04.4-desktop-amd64.iso ---
    initrd (http,[fd00:192:168:1::1])/ubuntu2004/casper/initrd
}
menuentry 'Ubuntu 20.04 IPv6 (SOL)' {
    linux (http,[fd00:192:168:1::1])/ubuntu2004/casper/vmlinuz ${common_root} url=http://[fd00:192:168:1::1]/ubuntu2004/ubuntu-20.04.4-desktop-amd64.iso ${sol_console} ---
    initrd (http,[fd00:192:168:1::1])/ubuntu2004/casper/initrd
}

